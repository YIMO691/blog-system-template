<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:fragment="nav">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" th:href="@{/}"><i class="bi bi-code-slash me-2"></i>Yimo's Blog</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav"
            aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link active" th:href="@{/articles}"><i class="bi bi-journal-text me-1"></i>文章</a></li>
        <li class="nav-item" th:if="${#authentication.name == 'admin'}">
          <a class="nav-link" th:href="@{/articles/editor/new}"><i class="bi bi-pencil-square me-1"></i>写文章</a>
        </li>
      </ul>

      <form class="d-flex me-3" th:action="@{/articles/search}" method="get" onsubmit="return this.keyword.value.trim() !== ''">
        <div class="input-group">
            <span class="input-group-text bg-light border-0"><i class="bi bi-search"></i></span>
            <input class="form-control border-0" type="search" name="keyword" placeholder="搜索文章..." required>
            <button class="btn btn-light border-0" type="submit">搜索</button>
        </div>
      </form>

      <ul class="navbar-nav">
        <li class="nav-item dropdown me-2" th:if="${#authorization.expression('isAuthenticated()')}">
          <a class="nav-link dropdown-toggle position-relative" href="#" id="noticeDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="bi bi-bell"></i>
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" th:if="${notificationsUnread != null and notificationsUnread > 0}" th:text="${notificationsUnread}">0</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="noticeDropdown" style="min-width: 320px;">
            <li th:if="${(notificationsRecent == null or notificationsRecent.isEmpty()) and (notificationsUnread == null or notificationsUnread == 0)}">
              <span class="dropdown-item text-muted">暂无通知</span>
            </li>
            <li class="px-3 py-2 text-muted small" th:if="${notificationsUnread != null and notificationsUnread > 0}">未读</li>
            <li th:each="n : ${notificationsRecent}" th:if="${!n.read}">
              <div class="dropdown-item d-flex align-items-center">
                <i class="bi me-2 bi-bell-fill text-danger"></i>
                <div class="flex-grow-1">
                  <div class="small fw-bold" th:text="${n.message}"></div>
                  <div class="small text-muted" th:text="${#temporals.format(n.createdAt, 'yyyy-MM-dd HH:mm', 'GMT+8')}"></div>
                </div>
              </div>
            </li>
            <li class="px-3 py-2 text-muted small">已读</li>
            <li th:each="n : ${notificationsRecent}" th:if="${n.read}">
              <div class="dropdown-item d-flex align-items-center">
                <i class="bi me-2 bi-bell"></i>
                <div class="flex-grow-1">
                  <div class="small" th:text="${n.message}"></div>
                  <div class="small text-muted" th:text="${#temporals.format(n.createdAt, 'yyyy-MM-dd HH:mm', 'GMT+8')}"></div>
                </div>
              </div>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <form th:action="@{/notifications/read-all}" method="post" class="d-inline px-3">
                <button class="btn btn-sm btn-outline-secondary" type="submit">全部标记为已读</button>
              </form>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
              <a class="dropdown-item" th:href="@{/admin/notifications}">查看全部</a>
            </li>
            <li th:if="${!#authorization.expression('hasRole(''ADMIN'')')}">
              <a class="dropdown-item" th:href="@{/profile/notifications}">查看全部</a>
            </li>
          </ul>
        </li>
        <li class="nav-item dropdown" th:if="${#authorization.expression('isAuthenticated()')}">
            <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-person-circle me-1"></i><span th:text="${#authentication.name}">User</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                <li th:if="${#authorization.expression('hasRole(''ADMIN'')')}"><a class="dropdown-item" th:href="@{/admin}"><i class="bi bi-speedometer2 me-2"></i>后台管理</a></li>
                <li><a class="dropdown-item" th:href="@{/profile}"><i class="bi bi-person-gear me-2"></i>个人中心</a></li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <form th:action="@{/auth/logout}" method="post" class="d-inline w-100">
                        <button class="dropdown-item text-danger" type="submit"><i class="bi bi-box-arrow-right me-2"></i>退出登录</button>
                    </form>
                </li>
            </ul>
        </li>

        <li class="nav-item" th:if="${#authorization.expression('isAnonymous()')}">
          <a class="btn btn-light text-primary me-2" th:href="@{/auth/login}">登录</a>
        </li>
        <li class="nav-item" th:if="${#authorization.expression('isAnonymous()')}">
          <a class="btn btn-outline-light" th:href="@{/auth/register}">注册</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
