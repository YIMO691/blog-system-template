<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="list(comments)">
  <div class="mb-3" th:each="c : ${comments}" th:id="'comment-' + ${c.id}">
    <div class="border rounded p-3 bg-light">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <div>
          <strong th:text="${c.displayName}">name</strong>
          <small class="text-muted ms-2" th:if="${c.createdAt != null}" 
                 th:text="${#temporals.format(c.createdAt, 'yyyy-MM-dd HH:mm', 'GMT+8')}"></small>
        </div>
        <div class="btn-group btn-group-sm">
           <form th:action="@{/articles/{slug}/comments/{id}/like(slug=${article.slug}, id=${c.id})}" method="post" class="d-inline me-2">
             <button type="submit" class="btn btn-sm" th:classappend="${c.likedByCurrentUser} ? 'btn-primary' : 'btn-outline-primary'">
               <i class="bi" th:classappend="${c.likedByCurrentUser} ? 'bi-hand-thumbs-up-fill' : 'bi-hand-thumbs-up'"></i> 
               <span th:text="${c.likes}">0</span>
             </button>
           </form>
           <button class="btn btn-outline-secondary btn-sm" 
                   th:if="${#authorization.expression('isAuthenticated()')}"
                   onclick="this.nextElementSibling.classList.toggle('d-none')">回复</button>
           <form th:action="@{/articles/{slug}/comments(slug=${article.slug})}" method="post" class="d-none ms-2" style="min-width: 300px; position: absolute; right: 0; z-index: 1000; background: white; padding: 10px; border: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
             <input type="hidden" name="parentId" th:value="${c.id}">
             <div class="mb-2">
               <textarea class="form-control form-control-sm" name="content" rows="3" placeholder="回复内容..." required></textarea>
             </div>
             <button type="submit" class="btn btn-primary btn-sm">提交回复</button>
           </form>
        </div>
      </div>
      <div style="white-space: pre-wrap;" th:text="${c.content}"></div>
      
      <div th:if="${#authorization.expression('hasRole(''ADMIN'')')}" class="mt-2 text-end">
        <form th:action="@{/admin/comments/{id}/delete(id=${c.id}, redirect='/articles/' + ${article.slug})}" method="post" class="d-inline">
          <button type="submit" class="btn btn-link text-danger p-0" style="font-size: 0.875rem;" 
                  onclick="return confirm('确定要删除这条评论吗？')">删除</button>
        </form>
      </div>
    </div>

    <!-- Recursive replies -->
    <div class="ms-4 mt-3 border-start ps-3" th:if="${!c.replies.isEmpty()}">
      <th:block th:replace="~{fragments/comment-tree :: list(${c.replies})}"></th:block>
    </div>
  </div>
</th:block>
</body>
</html>
