<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('写文章')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container" style="max-width: 900px;">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0 fw-bold"><i class="bi bi-pencil-square text-primary me-2"></i>写文章</h2>
    <a th:href="@{/articles}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>返回列表</a>
  </div>

  <div th:if="${drafts != null}" class="alert alert-info shadow-sm border-info">
    <div class="d-flex align-items-center mb-2">
      <i class="bi bi-journal-bookmark me-2 fs-5"></i>
      <strong class="fs-6">您有未发布的草稿：</strong>
    </div>
    <ul class="mb-0 list-unstyled ps-4">
      <li th:each="d : ${drafts}" class="mb-1">
        <i class="bi bi-caret-right-fill text-muted small me-1"></i>
        <span class="fw-bold text-dark" th:text="${d.title.isBlank() ? '（无标题）' : d.title}"></span>
        <small class="text-muted ms-2" th:if="${d.updatedAt != null}" 
               th:text="${#temporals.format(d.updatedAt, 'yyyy-MM-dd HH:mm', 'GMT+8')}"></small>
        <a class="ms-2 badge bg-primary text-decoration-none" th:href="@{/articles/editor/{id}(id=${d.id})}">继续编辑</a>
      </li>
    </ul>
  </div>

  <form th:action="@{/articles/editor}" th:object="${form}" method="post" class="card shadow-sm p-4 border-0">
    <input type="hidden" name="id" th:value="${articleId}">
    
    <div class="row g-3 mb-3">
        <div class="col-md-8">
            <label class="form-label fw-bold">标题 <span class="text-danger">*</span></label>
            <input class="form-control form-control-lg" th:field="*{title}" placeholder="请输入文章标题..." required>
            <div class="text-danger small" th:errors="*{title}"></div>
        </div>
        <div class="col-md-4">
            <label class="form-label fw-bold">分类</label>
            <div class="input-group">
                <select class="form-select form-select-lg" name="categoryId" id="categorySelect" th:field="*{categoryId}">
                    <option value="">（选择分类）</option>
                    <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                    <option value="-1">+ 新增分类...</option>
                </select>
            </div>
            <div id="newCategoryInput" class="mt-2" style="display: none;">
                <input class="form-control" name="newCategory" placeholder="输入新分类名称...">
            </div>
        </div>
    </div>

    <div class="mb-3">
      <label class="form-label fw-bold">标签</label>
      <div class="input-group">
        <span class="input-group-text bg-light"><i class="bi bi-tags"></i></span>
        <input class="form-control" name="tags" placeholder="输入标签，用英文逗号分隔（如：java, spring, boot）">
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label fw-bold">正文内容 <span class="text-danger">*</span></label>
      <textarea class="form-control font-monospace" rows="18" th:field="*{content}" placeholder="支持 Markdown 格式..." style="font-size: 0.95rem;"></textarea>
      <div class="text-danger small" th:errors="*{content}"></div>
    </div>
    
    <div class="mb-3">
      <label class="form-label fw-bold">插入图片</label>
      <div class="input-group">
        <input class="form-control" type="file" id="imageFile" accept="image/*">
        <button class="btn btn-outline-primary" type="button" id="uploadBtn">上传并插入</button>
      </div>
      <div class="form-text">成功后自动插入到正文</div>
    </div>

    <div class="d-flex justify-content-between align-items-center pt-3 border-top mt-2">
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" th:field="*{published}" id="publishSwitch">
          <label class="form-check-label fw-bold" for="publishSwitch">立即发布</label>
        </div>
        <button class="btn btn-success btn-lg px-5 rounded-pill shadow-sm" type="submit">
            <i class="bi bi-save me-2"></i>保存文章
        </button>
    </div>
  </form>
</div>

<script>
    const categorySelect = document.getElementById('categorySelect');
    const newCategoryInput = document.getElementById('newCategoryInput');
    
    categorySelect.addEventListener('change', function() {
        if (this.value === '-1') {
            newCategoryInput.style.display = 'block';
            newCategoryInput.querySelector('input').focus();
        } else {
            newCategoryInput.style.display = 'none';
            newCategoryInput.querySelector('input').value = '';
        }
    });
    
    const uploadBtn = document.getElementById('uploadBtn');
    const imageFile = document.getElementById('imageFile');
    const contentArea = document.querySelector('textarea[name="content"]');
    uploadBtn.addEventListener('click', async function() {
      if (!imageFile.files || imageFile.files.length === 0) return;
      const fd = new FormData();
      fd.append('file', imageFile.files[0]);
      const token = document.querySelector('meta[name=\"_csrf\"]')?.getAttribute('content');
      const headerName = document.querySelector('meta[name=\"_csrf_header\"]')?.getAttribute('content');
      const headers = {};
      if (token && headerName) { headers[headerName] = token; }
      const resp = await fetch('/articles/upload-image', { method: 'POST', headers, body: fd });
      const data = await resp.json();
      if (data && data.url) {
        const insert = `<img src="${data.url}" alt="" style="max-width:100%;">`;
        const start = contentArea.selectionStart || contentArea.value.length;
        const end = contentArea.selectionEnd || contentArea.value.length;
        contentArea.value = contentArea.value.substring(0, start) + insert + contentArea.value.substring(end);
        contentArea.focus();
      } else {
        alert('上传失败');
      }
    });
</script>
</body>
</html>
