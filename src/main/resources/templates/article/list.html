<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('文章列表')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container">
  <style>
    .group-title { scroll-margin-top: 80px; }
  </style>
  <div class="row g-4">
    <!-- 左侧文章列表 -->
    <div class="col-lg-9">
      <div class="d-flex align-items-center justify-content-between mb-4">
        <h2 class="mb-0 fw-bold"><i class="bi bi-list-ul text-primary me-2"></i>文章列表</h2>
        <div th:if="${keyword != null and keyword != ''}">
            <span class="text-muted me-2">筛选条件：</span>
            <span class="badge bg-primary rounded-pill px-3 py-2" th:text="${keyword}"></span>
            <a th:href="@{/articles}" class="btn btn-sm btn-link text-decoration-none ms-2"><i class="bi bi-x-circle me-1"></i>清除</a>
        </div>
      </div>

      <div th:if="${page.totalElements == 0}" class="alert alert-light text-center py-5 border rounded-3">
        <i class="bi bi-search fs-1 d-block mb-3 text-muted"></i>
        <span class="text-muted">没有找到相关文章</span>
      </div>

      <!-- 当有分组时显示分组视图 -->
      <div th:if="${groupedArticles != null and (currentCategoryId == null and (keyword == null or keyword == ''))}">
        <div th:each="entry : ${groupedArticles}" class="mb-5">
            <div class="d-flex align-items-center mb-3">
              <h4 class="fw-bold mb-0 border-start border-4 border-primary ps-3 group-title" th:text="${entry.key}">Category Name</h4>
            </div>
            <div class="row g-4">
                <div class="col-md-6" th:each="a : ${entry.value}">
                  <div class="card h-100 shadow-sm border-0 hover-card">
                    <div class="card-body d-flex flex-column">
                      <div class="mb-2">
                        <span class="badge bg-light text-secondary border fw-normal" th:if="${a.category != null}" th:text="${a.category.name}">分类</span>
                        <span class="badge bg-light text-secondary border fw-normal" th:unless="${a.category != null}">未分类</span>
                      </div>
                      <h5 class="card-title fw-bold mb-2">
                        <a th:href="@{'/articles/' + ${a.slug}}" class="text-decoration-none text-dark stretched-link" th:text="${a.title}">Title</a>
                      </h5>
                      <p class="card-text text-muted text-truncate flex-grow-1 small" th:text="${#strings.abbreviate(a.content, 80)}">Content preview...</p>
                      
                      <div class="mt-auto pt-3 border-top d-flex justify-content-between text-muted small">
                        <span><i class="bi bi-person me-1"></i><span th:text="${a.author.nickname ?: a.author.username}">Author</span></span>
                        <span><i class="bi bi-calendar3 me-1"></i><span th:text="${#temporals.format(a.createdAt, 'MM-dd')}">Date</span></span>
                      </div>
                      <div class="mt-2 d-flex justify-content-between text-muted small">
                         <span><i class="bi bi-eye me-1"></i><span th:text="${a.views}">0</span></span>
                         <span><i class="bi bi-hand-thumbs-up me-1"></i><span th:text="${a.likes}">0</span></span>
                      </div>
                    </div>
                  </div>
                </div>
            </div>
        </div>
      </div>

      <!-- 当无分组（如搜索结果或特定分类筛选）时显示普通网格 -->
      <div th:if="${groupedArticles == null or currentCategoryId != null or (keyword != null and keyword != '')}" class="row g-4">
        <div class="col-md-6" th:each="a : ${page.content}">
          <div class="card h-100 shadow-sm border-0 hover-card">
            <div class="card-body d-flex flex-column">
              <div class="mb-2">
                <span class="badge bg-primary bg-opacity-10 text-primary rounded-pill fw-normal" th:if="${a.category != null}" th:text="${a.category.name}">分类</span>
                <span class="badge bg-secondary bg-opacity-10 text-secondary rounded-pill fw-normal" th:unless="${a.category != null}">未分类</span>
              </div>
              <h5 class="card-title fw-bold mb-2">
                <a th:href="@{'/articles/' + ${a.slug}}" class="text-decoration-none text-dark stretched-link" th:text="${a.title}">Title</a>
              </h5>
              <p class="card-text text-muted text-truncate flex-grow-1 small" th:text="${#strings.abbreviate(a.content, 100)}">Content preview...</p>
              
              <div class="mt-auto pt-3 border-top d-flex justify-content-between text-muted small">
                <span><i class="bi bi-person me-1"></i><span th:text="${a.author.nickname ?: a.author.username}">Author</span></span>
                <span><i class="bi bi-calendar3 me-1"></i><span th:text="${#temporals.format(a.createdAt, 'MM-dd')}">Date</span></span>
              </div>
              <div class="mt-2 d-flex justify-content-between text-muted small">
                 <span><i class="bi bi-eye me-1"></i><span th:text="${a.views}">0</span></span>
                 <span><i class="bi bi-hand-thumbs-up me-1"></i><span th:text="${a.likes}">0</span></span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="mt-5 d-flex justify-content-center gap-2" th:if="${page.totalPages > 1}">
        <a class="btn btn-outline-primary px-4 rounded-pill"
           th:if="${page.number > 0}"
           th:href="@{/articles(page=${page.number - 1}, keyword=${keyword != null ? keyword : ''}, category=${currentCategoryId})}"><i class="bi bi-arrow-left me-1"></i>上一页</a>
        <span class="btn btn-light disabled rounded-pill px-3 border" th:text="${page.number + 1} + ' / ' + ${page.totalPages}"></span>
        <a class="btn btn-outline-primary px-4 rounded-pill"
           th:if="${page.number + 1 lt page.totalPages}"
           th:href="@{/articles(page=${page.number + 1}, keyword=${keyword != null ? keyword : ''}, category=${currentCategoryId})}">下一页<i class="bi bi-arrow-right ms-1"></i></a>
      </div>
    </div>

    <!-- 右侧分类侧边栏 -->
    <div class="col-lg-3">
      <div class="sticky-top" style="top: 2rem; z-index: 1;">
        <div class="card shadow-sm border-0 mb-4">
          <div class="card-header bg-white py-3 fw-bold border-bottom">
            <i class="bi bi-folder2-open me-2 text-primary"></i>文章分类
          </div>
          <div class="list-group list-group-flush">
            <a th:href="@{/articles}" 
               class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
               th:classappend="${currentCategoryId == null} ? 'active fw-bold' : ''">
              <span>全部文章</span>
              <i class="bi bi-chevron-right small" th:if="${currentCategoryId == null}"></i>
            </a>
            <a th:each="cat : ${allCategories}" 
               th:href="@{/articles(category=${cat.id})}" 
               class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
               th:classappend="${currentCategoryId == cat.id} ? 'active fw-bold' : ''">
              <span th:text="${cat.name}">Category</span>
              <i class="bi bi-chevron-right small" th:if="${currentCategoryId == cat.id}"></i>
            </a>
            <a th:href="@{/articles(category=-1)}" 
               class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
               th:classappend="${currentCategoryId == -1} ? 'active fw-bold' : ''">
              <span>未分类</span>
              <i class="bi bi-chevron-right small" th:if="${currentCategoryId == -1}"></i>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
