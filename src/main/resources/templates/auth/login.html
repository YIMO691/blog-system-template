<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('登录')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container" style="max-width: 520px;">
  <div class="card shadow-sm border-0">
    <div class="card-header bg-white fw-bold py-3 d-flex align-items-center">
      <i class="bi bi-box-arrow-in-right text-primary me-2"></i>登录
    </div>
    <div class="card-body p-4">
      <div class="alert alert-success" th:if="${param.registered}"><i class="bi bi-check-circle-fill me-2"></i>注册成功，请登录。</div>
      <div class="alert alert-success" th:if="${param.reset}"><i class="bi bi-check-circle-fill me-2"></i>密码重置成功，请使用新密码登录。</div>
      <div class="alert alert-danger" th:if="${param.error}"><i class="bi bi-exclamation-triangle-fill me-2"></i>用户名或密码错误。</div>
      
      <form th:action="@{/auth/login}" method="post">
        <div class="mb-3">
          <label class="form-label">用户名 / 邮箱</label>
          <div class="input-group">
            <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
            <input class="form-control" name="username" placeholder="输入用户名或邮箱" required>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">密码</label>
          <div class="input-group">
            <span class="input-group-text bg-light"><i class="bi bi-shield-lock"></i></span>
            <input class="form-control" name="password" type="password" id="loginPassword" placeholder="输入密码" required>
            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('loginPassword', this)"><i class="bi bi-eye"></i></button>
          </div>
        </div>
        <button class="btn btn-primary w-100" type="submit"><i class="bi bi-box-arrow-in-right me-1"></i>登录</button>
      </form>
      
      <div class="d-flex justify-content-between align-items-center mt-3">
        <a class="small" th:href="@{/auth/forgot}"><i class="bi bi-question-circle me-1"></i>忘记密码</a>
        <a class="small" th:href="@{/auth/register}"><i class="bi bi-person-plus me-1"></i>没有账号？去注册</a>
      </div>
    </div>
  </div>
</div>
<script>
function togglePassword(inputId, btn) {
  const input = document.getElementById(inputId);
  if (input.type === "password") {
    input.type = "text";
    btn.innerHTML = '<i class="bi bi-eye-slash"></i>';
  } else {
    input.type = "password";
    btn.innerHTML = '<i class="bi bi-eye"></i>';
  }
}
</script>
</body>
</html>
