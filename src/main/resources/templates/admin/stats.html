<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('系统统计')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container">
  <style>
    :root{
      --primary:#2563eb;--success:#22c55e;--warning:#f59e0b;--danger:#ef4444;--info:#0ea5e9;--muted:#6b7280;
    }
    .kpi-card{border-radius:12px;background:linear-gradient(135deg,#0d6efd 0%,#5aa9ff 100%);padding:20px 20px}
    .kpi-success{background:linear-gradient(135deg,#198754 0%,#4fd18e 100%)}
    .kpi-danger{background:linear-gradient(135deg,#dc3545 0%,#ff6b81 100%)}
    .kpi-info{background:linear-gradient(135deg,#0dcaf0 0%,#6fe3ff 100%)}
    .kpi-value{font-size:2.25rem;font-weight:800;line-height:1}
    .kpi-label{letter-spacing:.08em;opacity:.85}
    .kpi-icon{font-size:2.2rem;opacity:.85}
    .card{border: none; box-shadow:0 8px 20px rgba(0,0,0,0.05); border-radius:12px}
    .card-header{font-weight:700;background:transparent;border:none}
    .progress{height:10px;border-radius:999px}
    .hero{border-radius:14px;background:linear-gradient(135deg,#eef2ff 0%,#e0f2fe 100%);padding:20px 24px}
  </style>
  <div class="d-flex align-items-center mb-4">
    <div class="flex-grow-1">
      <h2 class="mb-0 fw-bold"><i class="bi bi-bar-chart text-info me-2"></i>系统统计</h2>
    </div>
    <div class="btn-group btn-group-sm" role="group" aria-label="range">
      <a th:href="@{/admin/stats(range=7)}" class="btn btn-outline-secondary" th:classappend="${range == 7} ? 'active'">最近7天</a>
      <a th:href="@{/admin/stats(range=30)}" class="btn btn-outline-secondary" th:classappend="${range == 30} ? 'active'">最近30天</a>
    </div>
  </div>
  <div class="hero mb-4 d-flex align-items-center justify-content-between">
    <div>
      <div class="fw-bold">欢迎回来，<span class="text-primary" th:text="${#authentication?.name}">admin</span> 👋</div>
      <div class="text-muted small" id="todayStr">今天</div>
    </div>
    <i class="bi bi-speedometer2 display-6 text-primary"></i>
  </div>

  <div class="row g-4 mb-4">
    <div class="col-md-6 col-lg-3">
      <div class="h-100 text-white kpi-card">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="text-uppercase small kpi-label">文章</div>
          <i class="bi bi-journal-text kpi-icon"></i>
        </div>
        <div class="kpi-value" th:text="${articleCount}">0</div>
        <div class="small mt-2 d-flex align-items-center">
          <span class="me-3"><i class="bi bi-check-circle me-1"></i><span th:text="${articlePublishedCount}">0</span> 已发布</span>
          <span><i class="bi bi-file-earmark me-1"></i><span th:text="${articleDraftCount}">0</span> 草稿</span>
        </div>
      </div>
    </div>
    <div class="col-md-6 col-lg-3">
      <div class="h-100 text-white kpi-card kpi-success">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="text-uppercase small kpi-label">评论</div>
          <i class="bi bi-chat-dots kpi-icon"></i>
        </div>
        <div class="kpi-value" th:text="${commentCount}">0</div>
        <div class="small mt-2 d-flex align-items-center">
          <span class="me-3"><i class="bi bi-check-all me-1"></i><span th:text="${commentApprovedCount}">0</span> 已通过</span>
          <span><i class="bi bi-hourglass-split me-1"></i><span th:text="${commentPendingCount}">0</span> 待审</span>
        </div>
      </div>
    </div>
    <div class="col-md-6 col-lg-3">
      <div class="h-100 text-white kpi-card kpi-danger">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="text-uppercase small kpi-label">互动</div>
          <i class="bi bi-activity kpi-icon"></i>
        </div>
        <div class="d-flex align-items-end gap-4">
          <div>
            <div class="small kpi-label mb-1">总浏览量</div>
            <div class="kpi-value" th:text="${totalViews ?: 0}">0</div>
          </div>
          <div>
            <div class="small kpi-label mb-1">总点赞</div>
            <div class="kpi-value" th:text="${totalLikes ?: 0}">0</div>
          </div>
        </div>
      </div>
    </div>
    <div class="col-md-6 col-lg-3">
      <div class="h-100 text-white kpi-card kpi-info">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="text-uppercase small kpi-label">用户</div>
          <i class="bi bi-people kpi-icon"></i>
        </div>
        <div class="kpi-value" th:text="${userCount}">0</div>
        <div class="small mt-2">注册用户总数</div>
      </div>
    </div>
  </div>

  <div class="alert alert-light border d-flex align-items-center mb-4">
    <i class="bi bi-info-circle me-2 text-primary"></i>
    <span>统计图表已暂时关闭，仅保留数据概览与系统信息。</span>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-header bg-white py-3 fw-bold"><i class="bi bi-cpu me-2"></i>系统运行环境</div>
    <div class="card-body">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="text-muted small">操作系统</label>
                <div class="fw-bold" th:text="${osName}"></div>
            </div>
            <div class="col-md-6">
                <label class="text-muted small">Java 版本</label>
                <div class="fw-bold" th:text="${javaVersion}"></div>
            </div>
            <div class="col-md-6">
                <label class="text-muted small">JVM 总内存</label>
                <div class="fw-bold font-monospace" th:text="${jvmMemory}"></div>
            </div>
            <div class="col-md-6">
                <label class="text-muted small">JVM 空闲内存</label>
                <div class="fw-bold font-monospace text-success" th:text="${jvmFreeMemory}"></div>
            </div>
        </div>
    </div>
  </div>

  <div class="mt-4">
    <a class="btn btn-outline-secondary rounded-pill px-4" th:href="@{/admin}"><i class="bi bi-arrow-left me-1"></i>返回仪表盘</a>
  </div>
</div>
<script>
  // Welcome date
  (function(){
    const el = document.getElementById('todayStr');
    if(!el) return;
    const d = new Date();
    const s = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    el.textContent = '今天是 ' + s;
  })();
</script>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
