<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('系统统计')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container">
  <div class="d-flex align-items-center mb-4">
    <h2 class="mb-0 fw-bold"><i class="bi bi-bar-chart text-info me-2"></i>系统统计</h2>
  </div>

  <div class="row g-4 mb-4">
    <div class="col-lg-6">
      <div class="card shadow-sm border-0">
        <div class="card-header bg-white py-3 fw-bold"><i class="bi bi-pie-chart me-2"></i>文章发布情况</div>
        <div class="card-body">
          <canvas id="chartArticles" height="40"></canvas>
        </div>
      </div>
    </div>
    <div class="col-lg-6">
      <div class="card shadow-sm border-0">
        <div class="card-header bg-white py-3 fw-bold"><i class="bi bi-pie-chart-fill me-2"></i>评论状态分布</div>
        <div class="card-body">
          <canvas id="chartComments" height="40"></canvas>
        </div>
      </div>
    </div>
  </div>

  <div class="card shadow-sm border-0 mb-5">
    <div class="card-header bg-white py-3 fw-bold"><i class="bi bi-bar-chart-steps me-2"></i>互动数据</div>
    <div class="card-body">
      <canvas id="chartInteractions" height="100"></canvas>
    </div>
  </div>

  <div class="row g-4 mb-5">
    <div class="col-md-6 col-lg-3">
      <div class="card shadow-sm border-0 h-100">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 class="text-muted text-uppercase mb-0">文章</h6>
            <i class="bi bi-journal-text fs-4 text-primary"></i>
          </div>
          <h2 class="display-6 fw-bold mb-3" th:text="${articleCount}">0</h2>
          <div class="small">
            <span class="text-success fw-bold"><i class="bi bi-check-circle me-1"></i><span th:text="${articlePublishedCount}"></span></span> 已发布
            <span class="text-muted mx-2">|</span>
            <span class="text-warning fw-bold"><i class="bi bi-file-earmark me-1"></i><span th:text="${articleDraftCount}"></span></span> 草稿
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-6 col-lg-3">
      <div class="card shadow-sm border-0 h-100">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 class="text-muted text-uppercase mb-0">评论</h6>
            <i class="bi bi-chat-dots fs-4 text-success"></i>
          </div>
          <h2 class="display-6 fw-bold mb-3" th:text="${commentCount}">0</h2>
          <div class="small">
            <span class="text-success fw-bold"><i class="bi bi-check-all me-1"></i><span th:text="${commentApprovedCount}"></span></span> 已通过
            <span class="text-muted mx-2">|</span>
            <span class="text-danger fw-bold"><i class="bi bi-hourglass-split me-1"></i><span th:text="${commentPendingCount}"></span></span> 待审核
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-6 col-lg-3">
      <div class="card shadow-sm border-0 h-100">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 class="text-muted text-uppercase mb-0">互动数据</h6>
            <i class="bi bi-activity fs-4 text-danger"></i>
          </div>
          <div class="mb-2">
            <span class="text-muted">总浏览量：</span>
            <span class="fw-bold fs-5" th:text="${totalViews ?: 0}">0</span>
          </div>
          <div>
            <span class="text-muted">总点赞数：</span>
            <span class="fw-bold fs-5" th:text="${totalLikes ?: 0}">0</span>
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-6 col-lg-3">
      <div class="card shadow-sm border-0 h-100">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 class="text-muted text-uppercase mb-0">用户</h6>
            <i class="bi bi-people fs-4 text-info"></i>
          </div>
          <h2 class="display-6 fw-bold mb-0" th:text="${userCount}">0</h2>
          <div class="small text-muted mt-3">注册用户总数</div>
        </div>
      </div>
    </div>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-header bg-white py-3 fw-bold"><i class="bi bi-cpu me-2"></i>系统运行环境</div>
    <div class="card-body">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="text-muted small">操作系统</label>
                <div class="fw-bold" th:text="${osName}"></div>
            </div>
            <div class="col-md-6">
                <label class="text-muted small">Java 版本</label>
                <div class="fw-bold" th:text="${javaVersion}"></div>
            </div>
            <div class="col-md-6">
                <label class="text-muted small">JVM 总内存</label>
                <div class="fw-bold font-monospace" th:text="${jvmMemory}"></div>
            </div>
            <div class="col-md-6">
                <label class="text-muted small">JVM 空闲内存</label>
                <div class="fw-bold font-monospace text-success" th:text="${jvmFreeMemory}"></div>
            </div>
        </div>
    </div>
  </div>

  <div class="mt-4">
    <a class="btn btn-outline-secondary rounded-pill px-4" th:href="@{/admin}"><i class="bi bi-arrow-left me-1"></i>返回仪表盘</a>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script th:inline="javascript">
 const articlePublished = /*[[${articlePublishedCount}]]*/ 0;
  const articleDraft     = /*[[${articleDraftCount}]]*/ 0;
  const commentApproved  = /*[[${commentApprovedCount}]]*/ 0;
  const commentPending   = /*[[${commentPendingCount}]]*/ 0;
  const totalViews       = /*[[${totalViews}]]*/ 0;
  const totalLikes       = /*[[${totalLikes}]]*/ 0;

  const theme = {
    primary: '#0d6efd',
    success: '#198754',
    warning: '#ffc107',
    info: '#0dcaf0',
    danger: '#dc3545',
    gray: '#6c757d'
  };

  const makeGradient = (ctx, color) => {
    const g = ctx.createLinearGradient(0, 0, 0, 180);
    g.addColorStop(0, color);
    g.addColorStop(1, 'rgba(255,255,255,0)');
    return g;
  };

  const elArticles = document.getElementById('chartArticles');
  const ctxArticles = elArticles.getContext('2d');
  new Chart(ctxArticles, {
    type: 'doughnut',
    data: {
      labels: ['已发布', '草稿'],
      datasets: [{
        data: [articlePublished, articleDraft],
        backgroundColor: [theme.success, theme.warning],
        borderWidth: 0
      }]
    },
    options: {
      plugins: {
        legend: { position: 'bottom' }
      },
      cutout: '60%'
    }
  });

  const elComments = document.getElementById('chartComments');
  const ctxComments = elComments.getContext('2d');
  new Chart(ctxComments, {
    type: 'doughnut',
    data: {
      labels: ['已通过', '待审核'],
      datasets: [{
        data: [commentApproved, commentPending],
        backgroundColor: [theme.primary, theme.danger],
        borderWidth: 0
      }]
    },
    options: {
      plugins: {
        legend: { position: 'bottom' }
      },
      cutout: '60%'
    }
  });

  const elInteractions = document.getElementById('chartInteractions');
  const ctxInteractions = elInteractions.getContext('2d');
  new Chart(ctxInteractions, {
    type: 'bar',
    data: {
      labels: ['浏览量', '点赞数'],
      datasets: [{
        label: '总数',
        data: [totalViews || 0, totalLikes || 0],
        backgroundColor: [makeGradient(ctxInteractions, theme.info), makeGradient(ctxInteractions, theme.primary)],
        borderColor: [theme.info, theme.primary],
        borderWidth: 1
      }]
    },
    options: {
      scales: {
        y: { beginAtZero: true, ticks: { precision: 0 } }
      },
      plugins: {
        legend: { display: false }
      }
    }
  });
</script>
</body>
</html>
