<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('通知中心')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">
  <div class="d-flex align-items-center mb-4">
    <h2 class="mb-0 fw-bold"><i class="bi bi-bell text-primary me-2"></i>通知中心</h2>
  </div>
  <div th:if="${notices == null or notices.isEmpty()}" class="alert alert-light">暂无通知</div>
  <div class="list-group">
    <div class="list-group-item d-flex align-items-center" th:each="n : ${notices}">
      <div class="me-3">
        <i class="bi" th:classappend="${n.read} ? 'bi-bell' : 'bi-bell-fill text-danger'"></i>
      </div>
      <div class="flex-grow-1">
        <div class="fw-bold" th:text="${n.message}"></div>
        <div class="small text-muted" th:text="${#temporals.format(n.createdAt, 'yyyy-MM-dd HH:mm', 'GMT+8')}"></div>
      </div>
      <div class="ms-auto">
        <a class="btn btn-outline-primary btn-sm me-2" th:if="${n.link != null}" th:href="${n.link}">查看</a>
        <form th:action="@{/admin/notifications/{id}/read(id=${n.id})}" method="post" class="d-inline">
          <button class="btn btn-outline-secondary btn-sm" type="submit" th:disabled="${n.read}">标记已读</button>
        </form>
      </div>
    </div>
  </div>
  <div class="mt-3">
    <form th:action="@{/notifications/delete-read}" method="post" class="d-inline">
      <button class="btn btn-outline-danger btn-sm" type="submit"><i class="bi bi-trash me-1"></i>删除已读通知</button>
    </form>
    <form th:action="@{/notifications/read-all}" method="post" class="d-inline ms-2">
      <button class="btn btn-outline-secondary btn-sm" type="submit"><i class="bi bi-check2-all me-1"></i>全部标记已读</button>
    </form>
  </div>
  <div class="mt-4">
    <a class="btn btn-outline-secondary rounded-pill px-4" th:href="@{/admin}"><i class="bi bi-arrow-left me-1"></i>返回仪表盘</a>
  </div>
  </div>
</body>
</html>
