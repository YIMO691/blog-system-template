<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('用户管理')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container">
  <h2 class="mb-3">用户管理</h2>

  <div th:if="${param.error}" class="alert alert-danger" th:text="${param.error}"></div>

  <table class="table table-striped">
    <thead>
    <tr>
      <th>ID</th><th>用户名</th><th>角色</th><th>注册时间</th><th>操作</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="u : ${users}">
      <td th:text="${u.id}"></td>
      <td th:text="${u.username}"></td>
      <td>
        <span class="badge bg-primary" th:if="${u.role.name() == 'ROLE_ADMIN'}">管理员</span>
        <span class="badge bg-secondary" th:if="${u.role.name() == 'ROLE_USER'}">普通用户</span>
        <span class="badge bg-danger" th:if="${u.muted}">已禁言</span>
      </td>
      <td th:text="${#temporals.format(u.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
      <td>
        <form th:if="${u.username != 'admin'}" th:action="@{/admin/users/{id}/toggle-admin(id=${u.id})}" method="post" style="display:inline;">
          <button type="submit" class="btn btn-sm" th:classappend="${u.role.name() == 'ROLE_ADMIN'} ? 'btn-outline-danger' : 'btn-outline-success'"
                  th:text="${u.role.name() == 'ROLE_ADMIN'} ? '撤职' : '设为管理员'"></button>
        </form>
        <form th:if="${u.username != 'admin'}" th:action="@{/admin/users/{id}/toggle-mute(id=${u.id})}" method="post" style="display:inline;">
          <button type="submit" class="btn btn-sm" th:classappend="${u.muted} ? 'btn-outline-success' : 'btn-outline-warning'"
                  th:text="${u.muted} ? '解除禁言' : '禁言'"></button>
        </form>
      </td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
