<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('文章管理')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container">
  <h2 class="mb-3">文章管理</h2>

  <table class="table table-striped">
    <thead>
    <tr>
      <th>ID</th><th>标题</th><th>状态</th><th>创建时间</th><th>操作</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="a : ${page.content}">
      <td th:text="${a.id}"></td>
      <td th:text="${a.title}"></td>
      <td>
        <span class="badge bg-success" th:if="${a.published}">已发布</span>
        <span class="badge bg-secondary" th:if="${!a.published}">草稿</span>
      </td>
      <td th:if="${a.createdAt != null}" 
          th:text="${#temporals.format(a.createdAt, 'yyyy-MM-dd HH:mm', 'GMT+8')}"></td>
      <td th:if="${a.createdAt == null}">-</td>
      <td>
        <div class="btn-group btn-group-sm">
          <a class="btn btn-outline-primary" th:href="@{/articles/editor/{id}(id=${a.id})}">编辑</a>
          <form th:action="@{/admin/articles/{id}/delete(id=${a.id})}" method="post" 
                onsubmit="return confirm('确定要删除这篇文章吗？')">
            <button type="submit" class="btn btn-outline-danger" style="border-top-left-radius: 0; border-bottom-left-radius: 0;">删除</button>
          </form>
        </div>
      </td>
    </tr>
    </tbody>
  </table>

  <div class="mt-3 d-flex gap-2">
    <a class="btn btn-outline-secondary"
       th:if="${page.number > 0}"
       th:href="@{/admin/articles(page=${page.number - 1})}">上一页</a>
    <a class="btn btn-outline-secondary"
       th:if="${page.number + 1 < page.totalPages}"
       th:href="@{/admin/articles(page=${page.number + 1})}">下一页</a>
  </div>

  <div class="mt-4">
    <a class="btn btn-outline-secondary rounded-pill px-4" th:href="@{/admin}"><i class="bi bi-arrow-left me-1"></i>返回仪表盘</a>
  </div>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
