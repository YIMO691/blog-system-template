<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('评论审核')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container">
  <h2 class="mb-3">待审核评论</h2>

  <div th:if="${pending.size() == 0}" class="text-muted">暂无待审核评论</div>

  <div th:each="c : ${pending}" class="border rounded p-3 mb-3">
    <div class="d-flex justify-content-between">
      <div>
        <strong th:text="${c.displayName}"></strong>
        <span class="text-muted"> · ArticleID=</span><span th:text="${c.article.id}"></span>
      </div>
      <small class="text-muted" th:text="${#temporals.format(c.createdAt, 'yyyy-MM-dd HH:mm')}"></small>
    </div>
    <div class="mt-2" style="white-space: pre-wrap;" th:text="${c.content}"></div>

    <div class="mt-3 d-flex gap-2">
      <form th:action="@{/admin/comments/{id}/approve(id=${c.id})}" method="post">
        <button class="btn btn-success btn-sm" type="submit">通过</button>
      </form>
      <form th:action="@{/admin/comments/{id}/delete(id=${c.id})}" method="post"
            onsubmit="return confirm('确定要删除这条评论吗？')">
        <button class="btn btn-outline-danger btn-sm" type="submit">删除</button>
      </form>
    </div>
  </div>
  <div class="mt-4">
    <a class="btn btn-outline-secondary rounded-pill px-4" th:href="@{/admin}"><i class="bi bi-arrow-left me-1"></i>返回仪表盘</a>
  </div>
</div>
</body>
</html>
