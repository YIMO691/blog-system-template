<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('首页')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container">
  <div class="row">
    <div class="col-lg-8">
      <div class="d-flex align-items-center mb-4">
        <h2 class="mb-0 fw-bold"><i class="bi bi-stars text-warning me-2"></i>最新文章</h2>
        <span class="badge bg-light text-dark ms-3 rounded-pill border" th:text="${articleTotal} + ' 篇'"></span>
      </div>
      
      <div th:if="${articleTotal == 0}" class="alert alert-info text-center py-5">
        <i class="bi bi-inbox fs-1 d-block mb-3"></i>
        暂无文章，敬请期待！
      </div>

      <div class="list-group list-group-flush border rounded-3 overflow-hidden shadow-sm">
        <a class="list-group-item list-group-item-action p-4 border-bottom"
           th:each="a : ${latest}"
           th:href="@{/articles/{slug}(slug=${a.slug})}">
          <div class="d-flex w-100 justify-content-between align-items-center mb-2">
            <h4 class="mb-1 fw-bold text-primary" th:text="${a.title}">title</h4>
            <span class="badge rounded-pill" 
                  th:classappend="${a.published} ? 'bg-success' : 'bg-warning text-dark'"
                  th:text="${a.published} ? '已发布' : '草稿'"></span>
          </div>
          <p class="text-secondary small mb-3 text-truncate" th:text="${a.content}">Content preview...</p>
          <div class="mb-2" th:if="${!a.tags.isEmpty()}">
            <i class="bi bi-tags-fill text-muted me-1 small"></i>
            <span th:each="tag : ${a.tags}" class="badge bg-light text-secondary border me-1 fw-normal" th:text="${tag.name}">Tag</span>
          </div>
          <div class="d-flex align-items-center article-meta">
             <span class="me-3"><i class="bi bi-calendar3 me-1"></i><span th:text="${#temporals.format(a.createdAt, 'yyyy-MM-dd HH:mm', 'GMT+8')}"></span></span>
             <span class="me-3"><i class="bi bi-person me-1"></i><span th:text="${a.author.nickname ?: a.author.username}"></span></span>
             <span class="me-3"><i class="bi bi-eye me-1"></i><span th:text="${a.views}"></span></span>
             <span><i class="bi bi-hand-thumbs-up me-1"></i><span th:text="${a.likes}"></span></span>
          </div>
        </a>
      </div>

      <div class="mt-4 d-flex justify-content-center" th:if="${articleTotal > 5}">
        <a class="btn btn-outline-primary px-4 rounded-pill" th:href="@{/articles}">
          更多文章<i class="bi bi-arrow-right ms-2"></i>
        </a>
      </div>
    </div>
    
    <div class="col-lg-4">
      <div class="card mb-4 shadow-sm border-0">
        <div class="card-header bg-white fw-bold py-3 border-bottom"><i class="bi bi-info-circle me-2 text-primary"></i>关于本站</div>
        <div class="card-body">
          <p class="card-text text-secondary">欢迎来到 Yimo's Blog！这里分享技术、生活与思考。</p>
        </div>
      </div>

      <div class="card mb-4 shadow-sm border-0">
        <div class="card-header bg-white fw-bold py-3 border-bottom"><i class="bi bi-folder2-open me-2 text-warning"></i>分类目录</div>
        <div class="list-group list-group-flush">
          <a th:each="c : ${categories}" th:href="@{/articles(category=${c.id})}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
            <span th:text="${c.name}">Category Name</span>
            <span class="badge bg-light text-secondary rounded-pill border">Go</span>
          </a>
          <a th:href="@{/articles(category=-1)}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
            <span>未分类</span>
            <span class="badge bg-light text-secondary rounded-pill border">Go</span>
          </a>
        </div>
      </div>

      <div class="card mb-4 shadow-sm border-0" th:if="${recentComments != null and !recentComments.isEmpty()}">
        <div class="card-header bg-white fw-bold py-3 border-bottom"><i class="bi bi-chat-quote me-2 text-success"></i>最新评论</div>
        <div class="list-group list-group-flush">
          <a th:each="c : ${recentComments}" th:href="@{'/articles/' + ${c.article.slug} + '#comment-' + ${c.id}}" class="list-group-item list-group-item-action py-3">
            <div class="d-flex w-100 justify-content-between mb-1">
              <strong class="text-dark" th:text="${c.displayName}">User</strong>
              <small class="text-muted" th:text="${#temporals.format(c.createdAt, 'MM-dd')}">Date</small>
            </div>
            <p class="mb-1 text-secondary text-truncate small" th:text="${c.content}">Content...</p>
            <small class="text-muted">评：<span th:text="${c.article.title}">Article Title</span></small>
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
