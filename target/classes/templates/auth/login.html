<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('登录')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container" style="max-width: 420px;">
  <h2 class="mb-3">登录</h2>

  <div class="alert alert-success" th:if="${param.registered}">注册成功，请登录。</div>
  <div class="alert alert-danger" th:if="${param.error}">用户名或密码错误。</div>

  <form th:action="@{/auth/login}" method="post">
    <div class="mb-3">
      <label class="form-label">用户名 / 邮箱 / 手机号</label>
      <input class="form-control" name="username" required>
    </div>
    <div class="mb-3">
      <label class="form-label">密码</label>
      <input class="form-control" name="password" type="password" required>
    </div>
    <button class="btn btn-primary w-100" type="submit">登录</button>
  </form>

  <div class="mt-3">
    <a th:href="@{/auth/register}">没有账号？去注册</a>
  </div>
</div>
</body>
</html>
